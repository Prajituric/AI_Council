<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f13">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GenX">
  <link rel="manifest" href="/manifest.json">
  <title>GenX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.0/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg width="34" height="34" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gx-lg" x1="2" y1="4" x2="42" y2="42" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#bfdbfe"/>
              <stop offset="45%" stop-color="#3b82f6"/>
              <stop offset="100%" stop-color="#1e40af"/>
            </linearGradient>
          </defs>
          <path d="M 25.5 11.5 A 13 13 0 1 0 28 23.5 L 16.5 23.5"
            stroke="url(#gx-lg)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="23" y1="10" x2="41" y2="35" stroke="url(#gx-lg)" stroke-width="3.8" stroke-linecap="round"/>
          <line x1="41" y1="10" x2="23" y2="35" stroke="url(#gx-lg)" stroke-width="3.8" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <h1 class="login-title">GenX</h1>
    <p class="login-sub" id="login-sub">Sign in to your account</p>

    <div class="login-form">
      <div class="login-field">
        <label id="lbl-username">Username</label>
        <input id="login-user" type="text" autocomplete="username" placeholder="your username" onkeydown="App.loginKey(event)">
      </div>
      <div class="login-field">
        <label id="lbl-password">Password</label>
        <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="App.loginKey(event)">
      </div>
      <p class="login-error" id="login-error" style="display:none"></p>
      <button class="login-btn" id="login-btn" onclick="App.login()">
        <span id="login-btn-text">Sign in</span>
      </button>
    </div>

    <div class="login-lang">
      <button onclick="App.setLang('en')" id="lang-en" class="lang-btn active">EN</button>
      <button onclick="App.setLang('ro')" id="lang-ro" class="lang-btn">RO</button>
      <button onclick="App.setLang('es')" id="lang-es" class="lang-btn">ES</button>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div class="layout" id="layout" style="display:none">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M 25.5 11.5 A 13 13 0 1 0 28 23.5 L 16.5 23.5"
              stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="23" y1="10" x2="41" y2="35" stroke="#93c5fd" stroke-width="4.5" stroke-linecap="round"/>
            <line x1="41" y1="10" x2="23" y2="35" stroke="#93c5fd" stroke-width="4.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">GenX</span>
      </div>
      <button class="btn-icon" onclick="App.newChat()" title="New chat"><i class="ti ti-edit"></i></button>
    </div>

    <div class="sidebar-search">
      <i class="ti ti-search"></i>
      <input id="search-inp" type="text" placeholder="Search..." oninput="App.search(this.value)">
    </div>

    <div class="sidebar-chats" id="chat-list"></div>

    <div class="sidebar-bottom">
      <!-- Account popup (opens above the user badge) -->
      <div class="account-popup" id="account-popup" style="display:none">
        <button class="account-popup-item" onclick="App.openModels();App.toggleAccountMenu()">
          <i class="ti ti-cpu"></i><span data-i18n="models">Models</span>
          <span class="sidebar-badge" id="badge-models">0</span>
        </button>
        <button class="account-popup-item" onclick="App.showSkillsHelp();App.toggleAccountMenu()" id="skills-link" title="Slash commands — /marketing, /engineering, /learn ...">
          <i class="ti ti-command"></i><span>Skills &amp; Commands</span>
          <div class="skill-active-dot" id="skill-dot" style="display:none"></div>
        </button>
        <button class="account-popup-item" onclick="App.openFiles();App.toggleAccountMenu()">
          <i class="ti ti-files"></i><span data-i18n="stored_files">Stored Files</span>
          <span class="sidebar-badge" id="badge-files">0</span>
        </button>
        <button class="account-popup-item" onclick="App.openUsage();App.toggleAccountMenu()">
          <i class="ti ti-chart-bar"></i><span>Usage &amp; Cost</span>
        </button>
        <button class="account-popup-item" onclick="App.openSettings();App.toggleAccountMenu()">
          <i class="ti ti-settings"></i><span data-i18n="settings">Settings</span>
        </button>
        <div class="account-popup-divider"></div>
        <button class="account-popup-item account-popup-danger" onclick="App.logout()">
          <i class="ti ti-logout"></i><span data-i18n="logout">Logout</span>
        </button>
      </div>

      <!-- Clickable user badge -->
      <div class="user-badge" id="user-badge" onclick="App.toggleAccountMenu()" style="cursor:pointer">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name-label">—</span>
        <i class="ti ti-chevron-up" id="account-chevron" style="margin-left:auto;font-size:12px;color:var(--tx3);transition:transform .2s"></i>
      </div>

      <!-- Status + language row -->
      <div class="sidebar-link status-row" id="status-row">
        <i class="ti ti-circle-filled" id="status-icon" style="font-size:8px;color:var(--tx3)"></i>
        <span id="status-text">...</span>
        <div class="lang-row" style="margin-left:auto;display:flex;gap:3px">
          <button onclick="App.setLang('en')" class="lang-mini" id="lm-en">EN</button>
          <button onclick="App.setLang('ro')" class="lang-mini" id="lm-ro">RO</button>
          <button onclick="App.setLang('es')" class="lang-mini" id="lm-es">ES</button>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="btn-icon sidebar-toggle" onclick="App.toggleSidebar()"><i class="ti ti-layout-sidebar"></i></button>
      <div class="model-strip" id="model-strip"></div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="btn-icon" id="btn-export" onclick="App.exportChat()" title="Export" style="display:none"><i class="ti ti-download"></i></button>
        <button class="btn-icon" id="btn-del-chat" onclick="App.deleteActiveChat()" title="Delete chat" style="display:none"><i class="ti ti-trash"></i></button>
      </div>
    </header>

    <main class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-logo">
          <svg width="38" height="38" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="gx-wl" x1="2" y1="4" x2="42" y2="42" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#bfdbfe"/>
                <stop offset="45%" stop-color="#3b82f6"/>
                <stop offset="100%" stop-color="#1e40af"/>
              </linearGradient>
            </defs>
            <path d="M 25.5 11.5 A 13 13 0 1 0 28 23.5 L 16.5 23.5"
              stroke="url(#gx-wl)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <line x1="23" y1="10" x2="41" y2="35" stroke="url(#gx-wl)" stroke-width="3.8" stroke-linecap="round"/>
            <line x1="41" y1="10" x2="23" y2="35" stroke="url(#gx-wl)" stroke-width="3.8" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 data-i18n="welcome_title">GenX</h1>
        <p data-i18n="welcome_sub">Simultaneous perspectives from multiple AI models,<br>synthesized by Claude Sonnet 4.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="App.suggest(0)"><i class="ti ti-file-description"></i><span data-i18n="s0">SaaS PRD with AI integration</span></button>
          <button class="suggestion" onclick="App.suggest(1)"><i class="ti ti-chart-bar"></i><span data-i18n="s1">Sales chart + Excel table</span></button>
          <button class="suggestion" onclick="App.suggest(2)"><i class="ti ti-presentation"></i><span data-i18n="s2">8-slide investor pitch deck</span></button>
          <button class="suggestion" onclick="App.suggest(3)"><i class="ti ti-git-branch"></i><span data-i18n="s3">Microservices architecture diagram</span></button>
        </div>
      </div>
      <div id="msg-list" style="display:none"></div>
    </main>

    <div class="input-wrap">
      <div class="file-chips" id="file-chips" style="display:none"></div>
      <div style="position:relative">
        <div class="slash-dropdown" id="slash-dropdown" style="display:none"></div>
        <div class="input-box" id="input-box">
          <button class="btn-icon btn-attach" onclick="document.getElementById('file-inp').click()" title="Attach files">
            <i class="ti ti-paperclip"></i>
          </button>
          <input type="file" id="file-inp" accept="image/*,.pdf,.txt,.md,.csv,.json,.xml,.docx,.xlsx,.py,.js,.ts,.html,.css,.sql" multiple style="display:none" onchange="App.onFiles(event)">
          <textarea id="prompt" rows="1" oninput="App.onPromptInput(this)" onkeydown="App.onKey(event)"></textarea>
          <button class="btn-send" id="btn-send" onclick="App.send()"><i class="ti ti-arrow-up"></i></button>
        </div>
      </div>
      </div>
      <p class="input-note" id="input-note"></p>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="overlay" id="overlay" onclick="App.closeOverlay(event)">
  <div class="modal modal-lg" id="modal-models" style="display:none">
    <div class="modal-head">
      <h2><i class="ti ti-cpu"></i> <span data-i18n="models">Models</span></h2>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-sm btn-ghost" onclick="App.importModels()"><i class="ti ti-upload"></i> Import</button>
        <button class="btn-sm btn-ghost" onclick="App.exportModels()"><i class="ti ti-download"></i> Export</button>
        <button class="btn-icon" onclick="App.closeModals()"><i class="ti ti-x"></i></button>
      </div>
    </div>
    <div class="modal-body" id="body-models"></div>
  </div>

  <div class="modal modal-lg" id="modal-files" style="display:none">
    <div class="modal-head">
      <h2><i class="ti ti-files"></i> <span data-i18n="stored_files">Stored Files</span></h2>
      <button class="btn-icon" onclick="App.closeModals()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="body-files"></div>
  </div>

  <div class="modal" id="modal-settings" style="display:none">
    <div class="modal-head">
      <h2><i class="ti ti-settings"></i> <span data-i18n="settings">Settings</span></h2>
      <button class="btn-icon" onclick="App.closeModals()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="body-settings"></div>
  </div>
</div>

<input type="file" id="import-inp" accept=".json" style="display:none" onchange="App.onImport(event)">
<!-- Module split: db → api → ui → app (load order matters for browser globals) -->
<script src="db.js"></script>
<script src="api.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
<script>
  // Register service worker for PWA offline support + home-screen install
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
